version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: contact_lens_db
      MYSQL_ROOT_PASSWORD: H@rdW0rk
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lenscart-network

  lenses-app:
    build: .
    container_name: lenses-app
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/contact_lens_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: H@rdW0rk
    networks:
      - lenscart-network

volumes:
  mysql_data:

networks:
  lenscart-network:
